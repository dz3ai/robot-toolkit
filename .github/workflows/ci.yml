name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ${{ matrix.os }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-13, windows-2022]
        python-version: ['3.10', '3.11', '3.12']
        exclude:
          # Skip some combinations to save CI time
          - os: windows-2022
            python-version: '3.10'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          python -m pip install --upgrade pip
          pip install numpy matplotlib pytest pytest-cov
          sudo apt-get update -qq
          sudo apt-get install -y g++ cmake

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          python -m pip install --upgrade pip
          pip install numpy matplotlib pytest pytest-cov
          brew install cmake

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          python -m pip install --upgrade pip
          pip install numpy matplotlib pytest pytest-cov
          # CMake is pre-installed on Windows runners

      - name: Install package
        run: |
          pip install -e .

      - name: Run tests
        run: |
          pytest test_ik.py test_dyn.py test_trajectory.py -v --cov=robot_ik --cov-report=xml --cov-report=term

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-22.04' && matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella

  lint:
    runs-on: ubuntu-22.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install linting tools
        run: |
          pip install black ruff mypy

      - name: Check formatting with black
        run: |
          black --check robot_ik/ test_*.py

      - name: Lint with ruff
        run: |
          ruff check robot_ik/ test_*.py

      - name: Type check with mypy
        run: |
          mypy robot_ik/ --ignore-missing-imports || true
